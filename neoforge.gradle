neoForge {
	version = neoforge_version

	validateAccessTransformers = true
	accessTransformers = [
			"src/main/resources/${mod_id}.accesstransformer.cfg"
	]
	interfaceInjectionData.from "src/main/resources/interfaces.json"

	mods {
		"${mod_id}" {
			sourceSet sourceSets.main
		}
	}

	runs {
		configureEach {
			loadedMods = [mods."${mod_id}"]

			systemProperty 'forge.logging.markers', 'REGISTRIES'

			systemProperty 'forge.logging.console.level', 'debug'

			sourceSet = project.sourceSets.main
		}

		client {
		}

		guideme {
			systemProperty 'guideme.showOnStartup', "${mod_id}:guide"
		}

		[client, guideme].each {
			it.client()

			it.gameDirectory.set(project.getLayout().getProjectDirectory().dir('runs/client'))

			if (System.getenv("MC_USERNAME") && System.getenv("MC_UUID")) {
				it.programArguments.addAll '--username', System.getenv("MC_USERNAME"), '--uuid', System.getenv("MC_UUID")
			}

			it.systemProperty 'forge.enabledGameTestNamespaces', project.mod_id

			it.systemProperty 'mixin.env.remapRefMap', 'true'
			it.systemProperty 'mixin.env.refMapRemappingFile', "${buildDir}/createSrgToMcp/output.srg"
			it.systemProperty 'mixin.debug.export', 'true'
			it.systemProperty 'mixin.debug.verbose', 'true'

			it.systemProperty "guideme.${mod_id}.guide.sources", file("src/main/resources/assets/${mod_id}/guide").absolutePath
		}

		server {
			server()

			gameDirectory.set(project.getLayout().getProjectDirectory().dir('runs/server'))

			systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
			programArgument '--nogui'
		}

		data {
			clientData()

			gameDirectory.set(project.getLayout().getProjectDirectory().dir('runs/data'))

			programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()

			systemProperty 'mixin.env.remapRefMap', 'true'
			systemProperty 'mixin.env.refMapRemappingFile', "${buildDir}/createSrgToMcp/output.srg"
			systemProperty 'mixin.debug.export', 'true'
			systemProperty 'mixin.debug.verbose', 'true'
		}
	}
}

tasks.withType(ProcessResources).configureEach {
	var replaceProperties = [
			minecraft_version       : minecraft_version,
			neoforge_version        : neoforge_version,
			loader_version_range    : loader_version_range,
			mod_id                  : mod_id,
			mod_name                : mod_name,
			mod_version             : version,
			mod_authors             : mod_authors,
			mod_description         : mod_description,
			mod_github              : mod_github,
			tesseract_version_range : tesseract_version_range,
			emi_version_range       : emi_version_range,
			guideme_version_range   : guideme_version_range
	]
	inputs.properties replaceProperties

	filesMatching(['META-INF/neoforge.mods.toml']) {
		expand replaceProperties
	}
}